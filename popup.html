<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InfoSci MS plan of study checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 310px;
      background: #f5f5f5;
      color: #1a1a1a;
      font-size: 13px;
    }
    header {
      background: #003366;
      color: white;
      padding: 11px 15px;
    }
    header h1 { font-size: 13px; font-weight: 700; letter-spacing: .1px; }
    header p  { font-size: 11px; opacity: 0.72; margin-top: 3px; }

    .body { padding: 13px 15px; }

    .field-label {
      display: block;
      font-weight: 600;
      font-size: 11px;
      margin-bottom: 5px;
      color: #003366;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    select {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #c9cdd2;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      color: #1a1a1a;
      margin-bottom: 12px;
      appearance: auto;
    }

    .btn-row { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary   { background: #003366; color: #fff; }
    .btn-primary:hover  { background: #00458a; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-secondary:hover { background: #d1d5db; }

    #status {
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
      line-height: 1.4;
    }
    .st-ok   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block !important; }
    .st-err  { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block !important; }
    .st-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; display: block !important; }

    .divider {
      margin: 12px 0;
      border: none;
      border-top: 1px solid #e5e7eb;
    }

    .hint {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.5;
      padding: 0 0 2px;
    }

    footer {
      text-align: center;
      padding: 8px;
      font-size: 10px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <header>
    <h1>InfoSci MS plan of study checker</h1>
  </header>

  <div class="body">
    <p class="hint">
      The panel appears automatically when a Plan of Study is loaded.
      Use the selector below to override the detected program or re-run manually.
    </p>

    <hr class="divider">

    <label class="field-label" for="programSelect">Program override</label>
    <select id="programSelect">
      <option value="">— Auto-detect from page —</option>
      <option value="msds">MS Data Science (MSDS)</option>
      <option value="msis-ml">MS Information Science — Machine Learning</option>
      <option value="msis-hcc">MS Information Science — Human-Centered Computing</option>
    </select>

    <div class="btn-row">
      <button class="btn-primary"   id="runBtn">Run check</button>
      <button class="btn-secondary" id="closeBtn">Close panel</button>
    </div>

    <div id="status"></div>
  </div>

  <footer>Data sourced from infosci.arizona.edu</footer>
  <script src="popup.js"></script>
</body>
</html>
